<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoleDirecte - Dashboard Officiel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0062ff;
            --primary-light: #eef4ff;
            --admin-red: #ff4757;
            --bg: #f8fafc;
            --text-main: #2d3436;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            background: var(--bg); 
            color: var(--text-main);
        }

        /* --- SIDEBAR --- */
        nav { 
            width: 260px; height: 100vh; background: white; 
            border-right: 1px solid var(--border); position: fixed; 
            display: flex; flex-direction: column; z-index: 100;
        }
        .logo-area { 
            padding: 30px 25px; font-size: 1.2rem; font-weight: 800; 
            color: var(--primary); letter-spacing: -1px;
            border-bottom: 1px solid #f1f5f9;
        }
        .menu { list-style: none; padding: 20px 0; flex-grow: 1; margin: 0; }
        .menu li { 
            padding: 12px 25px; margin: 4px 15px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; 
            color: #64748b; font-weight: 500; transition: 0.2s;
        }
        .menu li:hover { background: var(--primary-light); color: var(--primary); }
        .menu li.active { background: var(--primary); color: white; }
        .menu i { margin-right: 12px; width: 20px; font-size: 1.1rem; }

        /* --- BARRE ADMIN --- */
        #admin-bar { 
            display: none; position: fixed; top: 0; left: 260px; right: 0; 
            background: var(--admin-red); color: white; padding: 12px 30px; 
            z-index: 999; justify-content: space-between; align-items: center;
            font-weight: 600; box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }

        /* --- MAIN CONTENT --- */
        main { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .admin-on main { margin-top: 50px; }
        
        header { margin-bottom: 30px; }
        header h1 { font-size: 1.8rem; margin: 0; color: #1e293b; }

        /* --- EMPLOI DU TEMPS --- */
        .edt-container { 
            background: white; border-radius: 16px; padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid var(--border);
        }
        .timetable { 
            display: grid; grid-template-columns: 140px repeat(5, 1fr); gap: 12px; 
        }
        .day-label { 
            text-align: center; font-weight: 700; font-size: 0.85rem; 
            color: #94a3b8; padding: 10px; text-transform: uppercase;
        }
        .time-label { 
            background: #f1f5f9; border-radius: 8px; display: flex; 
            align-items: center; justify-content: center; font-size: 0.8rem; 
            font-weight: 600; color: #475569;
        }
        .cell { 
            background: white; border: 1px solid var(--border); border-radius: 8px; 
            min-height: 55px; padding: 10px; text-align: center; 
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; transition: 0.2s;
        }
        .break { 
            grid-column: span 5; background: #f8fafc; color: #94a3b8; 
            font-style: italic; border: 1px dashed var(--border); font-size: 0.8rem;
        }

        /* --- ÉTAT ADMIN --- */
        .admin-on .cell:not(.time-label):not(.break) { 
            border: 1px solid var(--admin-red); background: #fffafa; cursor: text;
        }
        .admin-on .cell:focus { outline: 2px solid var(--admin-red); background: white; }

        /* --- BOUTONS --- */
        .btn-admin-trigger {
            margin: 20px; padding: 12px; border-radius: 10px;
            background: #f1f5f9; border: none; color: #94a3b8;
            cursor: pointer; font-weight: 600; font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-admin-trigger:hover { background: #fee2e2; color: var(--admin-red); }
        
        .btn-save { 
            background: white; color: var(--admin-red); border: none; 
            padding: 8px 18px; border-radius: 6px; font-weight: 700; cursor: pointer; 
        }
    </style>
</head>
<body id="page-body">

    <div id="admin-bar">
        <span><i class="fas fa-user-shield"></i> MODE ÉDITION</span>
        <div>
            <button class="btn-save" onclick="saveData()">ENREGISTRER</button>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:7px 12px; border-radius:6px; cursor:pointer; margin-left:10px;">Quitter</button>
        </div>
    </div>

    <nav>
        <div class="logo-area">ECOLE<b>DIRECTE</b></div>
        <ul class="menu">
            <li><i class="fas fa-th-large"></i> Accueil</li>
            <li class="active"><i class="fas fa-calendar-alt"></i> Emploi du temps</li>
            <li><i class="fas fa-graduation-cap"></i> Mes notes</li>
            <li><i class="fas fa-envelope"></i> Messagerie</li>
        </ul>
        <button class="btn-admin-trigger" onclick="login()">
            <i class="fas fa-lock"></i> Administration
        </button>
    </nav>

    <main>
        <header>
            <h1>Emploi du temps</h1>
        </header>

        <div class="edt-container">
            <div class="timetable" id="edt-grid">
                <div></div>
                <div class="day-label">Lundi</div><div class="day-label">Mardi</div><div class="day-label">Mercredi</div><div class="day-label">Jeudi</div><div class="day-label">Vendredi</div>

                <div class="time-label">09h00 - 09h50</div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

                <div class="time-label">09h50 - 10h50</div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

                <div class="time-label">11h20 - 12h15</div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

                <div class="time-label">Pause</div>
                <div class="cell break">PAUSE DÉJEUNER</div>

                <div class="time-label">14h05 - 15h00</div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

                <div class="time-label">Récré</div>
                <div class="cell break">RÉCRÉATION</div>

                <div class="time-label">15h15 - 16h10</div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
        </div>
    </main>

    <script>
        // 1. Chargement au démarrage
        window.onload = () => {
            const saved = localStorage.getItem('edt_storage');
            if(saved) {
                const data = JSON.parse(saved);
                const cells = document.querySelectorAll('.cell:not(.break)');
                cells.forEach((cell, i) => { if(data[i]) cell.innerText = data[i]; });
            }
        };

        // 2. Fonction Login
        function login() {
            let pass = prompt("Code Administrateur :");
            if(pass === "admin123") {
                document.getElementById('page-body').classList.add('admin-on');
                document.getElementById('admin-bar').style.display = 'flex';
                document.querySelectorAll('.cell:not(.break)').forEach(c => c.contentEditable = true);
                alert("Mode édition activé. Cliquez dans les cases pour écrire.");
            } else {
                alert("Code incorrect.");
            }
        }

        // 3. Fonction Sauvegarde
        function saveData() {
            const data = [];
            document.querySelectorAll('.cell:not(.break)').forEach(c => data.push(c.innerText));
            localStorage.setItem('edt_storage', JSON.stringify(data));
            alert("✅ Emploi du temps enregistré sur ce navigateur !");
        }
    </script>
</body>
</html>
