<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoleDirecte - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0062ff;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1e293b; overflow: hidden; }

        /* --- ÉCRAN DE LOGIN --- */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            width: 100%; max-width: 400px; padding: 40px; text-align: center;
            border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .auth-card h2 { color: var(--primary); margin-bottom: 30px; }
        .auth-card input {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border);
            border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }
        .auth-card button {
            width: 100%; padding: 12px; margin-top: 20px; background: var(--primary);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .auth-card p { font-size: 0.9rem; color: #64748b; margin-top: 20px; cursor: pointer; }
        .auth-card p span { color: var(--primary); font-weight: bold; }

        /* --- DASHBOARD (Caché par défaut) --- */
        #dashboard { display: none; height: 100vh; }
        
        /* --- SIDEBAR --- */
        nav { 
            width: 280px; height: 100vh; background: white; border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .logo-area { padding: 30px 25px; font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .menu { list-style: none; padding: 10px; flex-grow: 1; margin: 0; }
        .menu li { 
            padding: 14px 20px; margin: 4px 8px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; color: #64748b; font-weight: 500;
        }
        .menu li.active { background: var(--primary); color: white; }
        .menu i { margin-right: 15px; width: 22px; }

        /* --- CONTENU --- */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* Emploi du temps */
        .timetable { display: grid; grid-template-columns: 140px repeat(5, 1fr); gap: 10px; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .cell { border: 1px solid var(--border); border-radius: 6px; min-height: 50px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .time-label { background: #f1f5f9; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card" id="login-form">
            <h2>Connexion</h2>
            <input type="text" id="login-user" placeholder="Nom d'utilisateur">
            <input type="password" id="login-pass" placeholder="Mot de passe">
            <button onclick="handleLogin()">Se connecter</button>
            <p onclick="toggleAuth()">Pas de compte ? <span>S'inscrire</span></p>
        </div>

        <div class="auth-card" id="signup-form" style="display: none;">
            <h2>Inscription</h2>
            <input type="text" id="sign-user" placeholder="Choisir un nom">
            <input type="password" id="sign-pass" placeholder="Choisir un mot de passe">
            <button onclick="handleSignup()">Créer mon compte</button>
            <p onclick="toggleAuth()">Déjà un compte ? <span>Se connecter</span></p>
        </div>
    </div>

    <div id="dashboard">
        <nav>
            <div class="logo-area">ECOLE<b>DIRECTE</b></div>
            <ul class="menu">
                <li class="active"><i class="fas fa-calendar-alt"></i> Emploi du temps</li>
                <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</li>
            </ul>
            <div style="padding: 20px; font-size: 0.8rem; color: #94a3b8;">Utilisateur : <b id="display-user"></b></div>
        </nav>

        <main>
            <h1>Mon Emploi du Temps</h1>
            <div class="timetable">
                <div></div><div style="text-align:center; font-weight:bold;">LUN</div><div style="text-align:center; font-weight:bold;">MAR</div><div style="text-align:center; font-weight:bold;">MER</div><div style="text-align:center; font-weight:bold;">JEU</div><div style="text-align:center; font-weight:bold;">VEN</div>
                <div class="cell time-label">09:00 - 09:50</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell time-label">09:50 - 10:50</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
        </main>
    </div>

    <script>
        // --- GESTION DES COMPTES ---
        function toggleAuth() {
            const login = document.getElementById('login-form');
            const signup = document.getElementById('signup-form');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            signup.style.display = signup.style.display === 'none' ? 'block' : 'none';
        }

        function handleSignup() {
            const user = document.getElementById('sign-user').value;
            const pass = document.getElementById('sign-pass').value;
            if(!user || !pass) return alert("Remplis tout !");

            let users = JSON.parse(localStorage.getItem('users_list') || "[]");
            if(users.find(u => u.name === user)) return alert("Ce nom existe déjà !");

            users.push({name: user, pass: pass});
            localStorage.setItem('users_list', JSON.stringify(users));
            alert("Compte créé ! Connecte-toi.");
            toggleAuth();
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            let users = JSON.parse(localStorage.getItem('users_list') || "[]");

            const found = users.find(u => u.name === user && u.pass === pass);
            if(found) {
                sessionStorage.setItem('currentUser', user);
                startApp(user);
            } else {
                alert("Identifiants incorrects.");
            }
        }

        function startApp(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('display-user').innerText = user;
            document.body.style.overflow = 'auto';
        }

        function logout() {
            sessionStorage.removeItem('currentUser');
            location.reload();
        }

        // Vérifier si déjà connecté au refresh
        window.onload = () => {
            const user = sessionStorage.getItem('currentUser');
            if(user) startApp(user);
        };
    </script>
</body>
</html>
