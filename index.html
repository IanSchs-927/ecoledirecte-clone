<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoleDirecte - IanSchs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0062ff; --bg: #f8fafc; --border: #e2e8f0; --text: #64748b; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 350px; padding: 40px; border: 1px solid var(--border); border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }
        .btn-auth { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        nav { width: 260px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { padding: 30px; font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .menu li { padding: 12px 25px; margin: 5px 15px; border-radius: 10px; cursor: pointer; color: var(--text); font-weight: 500; display: flex; align-items: center; }
        .menu li i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li.active { background: var(--primary); color: white; }
        main { flex-grow: 1; padding: 40px; overflow-y: auto; display: none; }
        .active-page { display: block !important; }
        .card { background: white; padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title" style="color:var(--primary)">Connexion</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button class="btn-auth" id="btn-auth" onclick="handleAuth()">Se connecter</button>
            <p id="toggle-p" style="font-size: 0.8rem; color: #94a3b8; margin-top: 15px; cursor: pointer;" onclick="window.toggleAuth()">
                Pas de compte ? <span style="color:var(--primary); font-weight:bold;">S'inscrire ici</span>
            </p>
        </div>
    </div>

    <nav id="sidebar" style="display: none;">
        <div class="logo">ECOLE<b>DIRECTE</b></div>
        <ul class="menu">
            <li onclick="showPage('page-edt', this)" class="active"><i class="fa-solid fa-calendar-days"></i> Emploi du temps</li>
            <li onclick="showPage('page-notes', this)"><i class="fa-solid fa-graduation-cap"></i> Mes notes</li>
        </ul>
        <button onclick="window.signOutUser()" style="margin: 20px; background: none; border: none; color: #ff4757; cursor: pointer;">Déconnexion</button>
    </nav>

    <main id="page-edt" class="active-page">
        <h1>Emploi du temps</h1>
        <div class="card">Bienvenue dans votre emploi du temps.</div>
    </main>

    <main id="page-notes">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Mes notes</h1>
            <button onclick="window.ouvrirFormulaireNote()" style="background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">+ Ajouter</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Matière</th><th>Note</th><th>Coef</th></tr></thead>
                <tbody id="notes-list"></tbody>
            </table>
            <h3 style="margin-top: 20px;">Moyenne : <span id="moyenne-gen" style="color: var(--primary);">0.00</span></h3>
        </div>
    </main>

    <script type="module" id="v2">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Mise à jour forcée v3
        const firebaseConfig = {
            apiKey: "AIzaSyBVZwN2vznc3sU8frQosos4vVEgqBmrJjM",
            authDomain: "monecoledirecte.firebaseapp.com",
            projectId: "monecoledirecte",
            storageBucket: "monecoledirecte.firebasestorage.app",
            messagingSenderId: "543788775430",
            appId: "1:543788775430:web:4860b7498c460f78953110"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = true;

        // FONCTION TOGGLE (CORRIGÉE)
        window.toggleAuth = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Connexion" : "Inscription";
            document.getElementById('btn-auth').innerText = isLoginMode ? "Se connecter" : "Créer un compte";
            document.getElementById('toggle-p').innerHTML = isLoginMode ? 'Pas de compte ? <span style="color:var(--primary); font-weight:bold;">S' + "inscrire ici</span>" : 'Déjà un compte ? <span style="color:var(--primary); font-weight:bold;">Se connecter</span>';
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Erreur Firebase : " + e.message); }
        };

        window.signOutUser = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('page-edt').classList.add('active-page');
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('sidebar').style.display = 'none';
            }
        });

        window.showPage = (id, el) => {
            document.querySelectorAll('main').forEach(m => m.classList.remove('active-page'));
            document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
        };

        window.ouvrirFormulaireNote = () => {
            const m = prompt("Matière ?");
            const n = parseFloat(prompt("Note ?"));
            const c = parseFloat(prompt("Coef ?"));
            if(m && !isNaN(n)) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${m}</td><td>${n}/20</td><td>${c}</td>`;
                document.getElementById('notes-list').appendChild(tr);
            }
        };
    </script>
</body>
</html>
