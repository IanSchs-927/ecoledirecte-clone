<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EcoleDirecte - Correction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --admin: #d63031; --bg: #f1f3f6; }
        body { font-family: sans-serif; margin: 0; display: flex; background: var(--bg); }
        
        /* Sidebar */
        nav { width: 250px; height: 100vh; background: white; border-right: 1px solid #ddd; position: fixed; display: flex; flex-direction: column; }
        .menu { list-style: none; padding: 20px 0; flex-grow: 1; }
        .menu li { padding: 15px 25px; color: #636e72; cursor: pointer; }
        
        /* Barre Admin */
        #admin-bar { 
            display: none; position: fixed; top: 0; left: 250px; right: 0; 
            background: var(--admin); color: white; padding: 15px; z-index: 9999;
            justify-content: space-between; align-items: center;
        }

        /* Contenu */
        main { margin-left: 250px; padding: 30px; width: 100%; }
        .admin-on main { margin-top: 60px; }

        /* Grille */
        .timetable { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 10px; background: white; padding: 20px; border-radius: 10px; }
        .cell { border: 1px solid #eee; padding: 15px; text-align: center; min-height: 40px; }
        .admin-on .cell:not(.time) { border: 1px solid var(--admin); background: #fff5f5; }

        /* LE BOUTON QUI DOIT MARCHER */
        .btn-lock { 
            padding: 20px; background: #eee; text-align: center; cursor: pointer; 
            font-size: 0.8rem; color: #999; border: none; width: 100%;
        }
        .btn-lock:hover { background: #e2e2e2; color: var(--admin); }
    </style>
</head>
<body id="page-body">

    <div id="admin-bar">
        <span>MODE ADMIN ACTIF</span>
        <button onclick="saveEDT()" style="padding: 5px 15px; cursor: pointer;">Sauvegarder</button>
    </div>

    <nav>
        <div style="padding:20px; font-weight:bold; color:var(--primary)">ECOLE DIRECTE</div>
        <ul class="menu">
            <li style="color:var(--primary); font-weight:bold;">Emploi du temps</li>
            <li>Notes</li>
        </ul>
        <button class="btn-lock" onclick="runAdminLogin()">
            <i class="fas fa-lock"></i> Accès Administrateur
        </button>
    </nav>

    <main>
        <h1>Emploi du temps</h1>
        <div class="timetable" id="grid">
            <div class="cell time">09h00</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell time">10h00</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell time">11h00</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
    </main>

    <script>
        // Fonction de chargement
        function loadData() {
            const data = localStorage.getItem('myEDT');
            if(data) {
                const values = JSON.parse(data);
                const cells = document.querySelectorAll('.cell:not(.time)');
                cells.forEach((c, i) => c.innerText = values[i] || "");
            }
        }
        loadData();

        // Fonction de connexion
        function runAdminLogin() {
            console.log("Tentative de connexion...");
            let p = prompt("Code secret (admin123) :");
            if(p === "admin123") {
                document.getElementById('page-body').classList.add('admin-on');
                document.getElementById('admin-bar').style.display = 'flex';
                document.querySelectorAll('.cell:not(.time)').forEach(c => c.contentEditable = true);
                alert("Mode Admin Activé !");
            } else {
                alert("Code incorrect.");
            }
        }

        // Fonction de sauvegarde
        function saveEDT() {
            const values = [];
            document.querySelectorAll('.cell:not(.time)').forEach(c => values.push(c.innerText));
            localStorage.setItem('myEDT', JSON.stringify(values));
            alert("Enregistré !");
        }
    </script>
</body>
</html>
