<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoleDirecte - Cloud Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0062ff; --bg: #f8fafc; --border: #e2e8f0; --admin-red: #ff4757; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1e293b; overflow-x: hidden; }

        /* --- ECRAN AUTHENTIFICATION --- */
        #auth-screen { 
            position: fixed; inset: 0; background: white; z-index: 2000; 
            display: flex; align-items: center; justify-content: center; 
        }
        .auth-card { width: 380px; padding: 40px; border: 1px solid var(--border); border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .auth-card h2 { color: var(--primary); margin-bottom: 25px; font-weight: 800; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 15px; }
        .toggle-auth { font-size: 0.9rem; color: #64748b; margin-top: 20px; cursor: pointer; }
        .toggle-auth span { color: var(--primary); font-weight: bold; }

        /* --- DASHBOARD --- */
        #app { display: none; min-height: 100vh; }
        
        /* Sidebar (Comme ta capture) */
        nav { width: 280px; height: 100vh; background: white; border-right: 1px solid var(--border); position: fixed; display: flex; flex-direction: column; }
        .logo-area { padding: 30px 25px; font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .menu { list-style: none; padding: 10px; flex-grow: 1; margin: 0; }
        .menu li { padding: 14px 20px; margin: 4px 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; color: #64748b; font-weight: 500; transition: 0.2s; }
        .menu li.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(0, 98, 255, 0.2); }
        .menu i { margin-right: 15px; width: 22px; font-size: 1.1rem; }

        /* Contenu */
        main { margin-left: 280px; padding: 40px; width: 100%; box-sizing: border-box; }
        .user-info { position: absolute; bottom: 20px; left: 20px; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 15px; width: calc(100% - 40px); }

        /* EDT Grid */
        .edt-container { background: white; border-radius: 16px; padding: 25px; border: 1px solid var(--border); margin-top: 20px; }
        .timetable { display: grid; grid-template-columns: 140px repeat(5, 1fr); gap: 10px; }
        .cell { border: 1px solid var(--border); border-radius: 8px; min-height: 50px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .time-label { background: #f8fafc; font-weight: 600; font-size: 0.8rem; color: #64748b; }
        .day-label { font-weight: 700; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; padding-bottom: 10px; }

        /* Admin Toolbar */
        #admin-toolbar { display: none; position: fixed; top: 0; left: 280px; right: 0; background: var(--admin-red); color: white; padding: 12px 30px; z-index: 1000; justify-content: space-between; align-items: center; }
        .admin-on main { padding-top: 80px; }
        .admin-on .cell:not(.time-label) { border: 1px solid var(--admin-red); background: #fffafa; cursor: text; }
    </style>
</head>
<body id="page-body">

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Connexion</h2>
            <input type="email" id="email" placeholder="Email (ex: eleve@test.com)">
            <input type="password" id="password" placeholder="Mot de passe">
            <button class="btn-main" id="btn-auth" onclick="handleAuth()">Se connecter</button>
            <p class="toggle-auth" onclick="toggleAuthMode()">Pas de compte ? <span id="toggle-text">S'inscrire</span></p>
        </div>
    </div>

    <div id="admin-toolbar">
        <span><i class="fas fa-user-shield"></i> MODE ADMIN ACTIF</span>
        <button onclick="saveData()" style="background: white; color: var(--admin-red); border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">SAUVEGARDER</button>
    </div>

    <div id="app">
        <nav>
            <div class="logo-area">ECOLE<b>DIRECTE</b></div>
            <ul class="menu">
                <li><i class="fas fa-th-large"></i> Accueil</li>
                <li class="active"><i class="fas fa-calendar-alt"></i> Emploi du temps</li>
                <li><i class="fas fa-graduation-cap"></i> Notes</li>
                <li onclick="logout()" style="margin-top: 20px; color: #ff4757;"><i class="fas fa-sign-out-alt"></i> Déconnexion</li>
            </ul>
            <div class="user-info">
                <i class="fas fa-user-circle"></i> <span id="user-email"></span><br>
                <span onclick="askAdmin()" style="cursor:pointer; color: var(--primary); font-size: 0.7rem;">Accès Admin</span>
            </div>
        </nav>

        <main>
            <h1>Emploi du temps</h1>
            <div class="edt-container">
                <div class="timetable">
                    <div></div><div class="day-label">Lundi</div><div class="day-label">Mardi</div><div class="day-label">Mercredi</div><div class="day-label">Jeudi</div><div class="day-label">Vendredi</div>
                    
                    <div class="cell time-label">09h00 - 09h50</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell time-label">09h50 - 10h50</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell time-label">11h20 - 12h15</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURATION DE TA CAPTURE D'ÉCRAN
        const firebaseConfig = {
            apiKey: "AIzaSyBVZwN2vznc3sU8frQosos4vVEgqBmrJjM",
            authDomain: "monecoledirecte.firebaseapp.com",
            projectId: "monecoledirecte",
            storageBucket: "monecoledirecte.firebasestorage.app",
            messagingSenderId: "543788775430",
            appId: "1:543788775430:web:4860b7498c460f78953110",
            measurementId: "G-9QNVV0K2G9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = true;

        // Basculer Inscription / Connexion
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Connexion" : "Inscription";
            document.getElementById('btn-auth').innerText = isLoginMode ? "Se connecter" : "Créer mon compte";
            document.getElementById('toggle-text').innerText = isLoginMode ? "S'inscrire" : "Se connecter";
        };

        // Gérer Auth
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Erreur : " + e.message); }
        };

        // Déconnexion
        window.logout = () => signOut(auth);

        // Etat de la connexion
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('user-email').innerText = user.email;
                loadSavedEDT();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // --- PARTIE ADMIN ---
        window.askAdmin = () => {
            let p = prompt("Code secret Admin :");
            if(p === "admin123") {
                document.getElementById('page-body').classList.add('admin-on');
                document.getElementById('admin-toolbar').style.display = 'flex';
                document.querySelectorAll('.cell:not(.time-label)').forEach(c => c.contentEditable = true);
            }
        };

        window.saveData = () => {
            const data = [];
            document.querySelectorAll('.cell:not(.time-label)').forEach(c => data.push(c.innerText));
            localStorage.setItem('edt_cloud_sim', JSON.stringify(data));
            alert("Sauvegardé !");
        };

        function loadSavedEDT() {
            const saved = localStorage.getItem('edt_cloud_sim');
            if(saved) {
                const data = JSON.parse(saved);
                const cells = document.querySelectorAll('.cell:not(.time-label)');
                cells.forEach((c, i) => { if(data[i]) c.innerText = data[i]; });
            }
        }
    </script>
</body>
</html>
